<head>

	<script type="text/javascript" src="kv5.js"></script>

<body style="background-color: antiquewhite;">
	<canvas id="the_canvas"
		width="640"
		height="480"
		></canvas>
	<pre id="the_output"
		style="background-color: white;"
		width="640"

	</script>
